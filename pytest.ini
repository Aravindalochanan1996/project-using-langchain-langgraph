[pytest]
# NOTE on langsmith / uuid_utils crashes on Windows corporate machines:
#
# `addopts = -p no:langsmith` below does NOT prevent the crash some users
# see (DLL load failed while importing _uuid_utils: An Application Control
# policy has blocked this file). That's because pytest loads setuptools
# entry-point plugins (including langsmith's) during its OWN startup,
# before .ini files are parsed — so -p no:langsmith here is too late.
#
# If you hit that error, the real fix is to set this environment variable
# before running pytest, which disables entry-point plugin auto-loading
# entirely (this happens early enough to actually work):
#
#   Windows (PowerShell):
#     $env:PYTEST_DISABLE_PLUGIN_AUTOLOAD = "1"; pytest tests/ -v
#
#   Windows (cmd.exe):
#     set PYTEST_DISABLE_PLUGIN_AUTOLOAD=1 && pytest tests/ -v
#
#   macOS / Linux:
#     PYTEST_DISABLE_PLUGIN_AUTOLOAD=1 pytest tests/ -v
#
# Or permanently remove the offending package (this project never imports
# it directly):
#
#   pip uninstall langsmith -y
#
addopts = -p no:langsmith
