[pytest]
# Disable the langsmith pytest plugin auto-load.
# langsmith (LangChain's telemetry/tracing package) ships a pytest plugin
# that's auto-discovered via entry points. It pulls in uuid_utils, which
# bundles a compiled DLL. On machines with strict Application Control
# policies (common on corporate Windows laptops), that DLL load is blocked
# and crashes pytest before any tests even run.
#
# This project doesn't use langsmith tracing, so the plugin is safely
# disabled at the source instead of requiring -p no:langsmith on every run.
addopts = -p no:langsmith
