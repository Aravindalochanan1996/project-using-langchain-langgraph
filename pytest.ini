[pytest]
# ════════════════════════════════════════════════════════════════════
# READ THIS if pytest crashes with a langsmith/uuid_utils DLL error
# ════════════════════════════════════════════════════════════════════
#
# On Windows machines with strict Application Control / AppLocker
# policies, running plain `pytest` can crash with:
#
#   ImportError: DLL load failed while importing _uuid_utils:
#   An Application Control policy has blocked this file.
#
# CAUSE: pytest auto-loads langsmith's pytest plugin via setuptools
# entry points DURING ITS OWN STARTUP — before this pytest.ini file is
# even read. So `addopts = -p no:langsmith` below cannot prevent this
# specific crash; it only helps for plugins that haven't loaded yet.
#
# FIX: always run tests via the provided wrapper script, which sets
# the one environment variable that's read early enough to work:
#
#   Windows:        scripts\run_tests.bat
#   macOS / Linux:   bash scripts/run_tests.sh
#
# These set PYTEST_DISABLE_PLUGIN_AUTOLOAD=1, which stops ALL
# setuptools-entry-point plugins (including langsmith's) from loading
# at all — early enough in Python's startup to actually take effect.
#
# Do NOT remove langsmith from your environment — it IS a real
# dependency of langchain_core.tracers (not just an optional extra),
# so `pip uninstall langsmith` will break langgraph/langchain_core
# imports differently. Keep it installed; just block its pytest plugin.
#
# This project also ships src/_uuid_utils_shim.py (auto-installed via
# conftest.py) which separately handles langchain_core's own DIRECT
# need for uuid_utils during normal (non-pytest-plugin) imports — that
# part works automatically and needs no env var.
#
addopts = -p no:langsmith
